<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JayaStore</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <a href="/html/index.html">JAYA<span>STORE</span></a>
        </div>

        <div class="login-card">
            <h2>Login</h2>
            <p class="login-subtitle">Welcome back! Sign in to your account.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>

                <label class="remember-row">
                    <input type="checkbox" id="remember" />
                    <span>Remember Me</span>
                </label>

                <button type="submit">Login</button>
            </form>

            <p class="login-footer">Don't have an account? <a href="/html/register.html">Register</a></p>
        </div>
    </div>

    <script src="../js/login.js" type="module"></script>
</body>
</html>
