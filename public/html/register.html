<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JayaStore</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/notifications.css">
</head>
<body>
    <div class="register-wrapper">
        <div class="register-brand">
            <a href="/html/index.html">JAYA<span>STORE</span></a>
        </div>

        <div class="register-card">
            <h2>Register</h2>
            <p class="register-subtitle">Create your account to get started.</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required />
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required />
                </div>

                <label class="terms-row">
                    <input type="checkbox" id="terms" />
                    <span>I agree to the <a href="#">Terms & Conditions</a></span>
                </label>

                <button type="submit">Create Account</button>
            </form>

            <p class="register-footer">Already have an account? <a href="/html/login.html">Login</a></p>
        </div>
    </div>

    <script src="../js/notifications.js"></script>
    <script src="../js/register.js" type="module"></script>
</body>
</html>
